// 같은 (구분,점검내용) 항목이 그 달에 여러 번(재방문 등) 기록됐어도 원본 템플릿은 항목당 1행만
// 보여준다(2026-07-24 실측 확인 — 방문일자는 부제 "일자 : ..."에 전부 나열되므로 행 자체는
// 최신 날짜 1건으로 대표). 정렬은 구분 순서 다음 체크리스트 카탈로그 순서(TEAM_CHECKLIST_BY_GUBUN)
// 그대로 — 방문일자 순서가 아니라 표준 점검표 순서로 보여야 하기 때문.
function elecInspTunnelRows(recs){
  const byKey={};
  recs.forEach(r=>{
    const key=r['구분']+'|'+r['점검내용'];
    const prev=byKey[key];
    if(!prev || (r['날짜']||'')>(prev['날짜']||'')) byKey[key]=r;
  });
  const rows=Object.values(byKey);
  rows.sort((a,b)=>{
    const ga=ELECINSP_GUBUN_ORDER.indexOf(a['구분']), gb=ELECINSP_GUBUN_ORDER.indexOf(b['구분']);
    if(ga!==gb) return ga-gb;
    const ca=(TEAM_CHECKLIST_BY_GUBUN[a['구분']]||[]).indexOf(a['점검내용']);
    const cb=(TEAM_CHECKLIST_BY_GUBUN[b['구분']]||[]).indexOf(b['점검내용']);
    if(ca!==cb) return ca-cb;
    return (a['날짜']||'').localeCompare(b['날짜']||'');
  });
  return rows;
}
function elecInspGubunSpans(rows){
  const spans=[]; let i=0;
  while(i<rows.length){
    let j=i;
    while(j<rows.length && rows[j]['구분']===rows[i]['구분']) j++;
    spans.push({start:i, end:j-1});
    i=j;
  }
  return spans;
}
// 시트 컬럼폭(구분/점검내용/점검방법/점검결과/비고) — buildElecInspReportSheet의 ws.columns와 동일한
// 값을 행높이 자동계산(excelWrapAwareRowHeight)에도 그대로 써야 해서 상수로 분리.
const ELECINSP_COL_WIDTHS=[12,42,10,10,14];
// 점검사진 대지 시트 A~J 컬럼폭 — 템플릿(사진1 시트) 실측값(2026-07-24). 번호(A/F)=좁게,
// 라벨(B/G)=중간, 값(C~E/H~J, 3칸 병합)=넓게. 이전엔 10칸 균등폭(7.86)이었으나 템플릿과
// 실제 인쇄 레이아웃이 달라서 실측값으로 교체.
const TEAM_PHOTO_COL_WIDTHS=[4.640625,7.85546875,10.140625,10.140625,10.140625,4.640625,7.85546875,10.140625,10.140625,10.140625];
// 특이사항 여백 박스 높이(행 수) — 템플릿 실측(2026-07-24): 라벨행 1 + 필기 여백행 4, 총 5행.
const ELECINSP_NOTE_ROWS=5;
// 터널 표 블록(부제+헤더+데이터+특이사항)을 시트의 startRow부터 그려 넣고, 다음 블록이 시작할
// 행(특이사항 여백 박스 뒤 빈 줄 포함)을 반환 — 남정1,2+남정3처럼 시트 하나에 터널 2개가 쌓이는 구조용.
function drawElecInspTunnelBlock(ws, startRow, tunnel, rows, recs, year, month){
  const SECTION_FILL={type:'pattern', pattern:'solid', fgColor:{argb:'FFF2F2F2'}};
  // 방문일자 목록은 대표행(rows, 중복 제거됨)이 아니라 원본 레코드(recs) 전체 기준 — 그 달에 실제
  // 방문한 모든 날짜를 보여줘야 하므로.
  const days=[...new Set(recs.map(r=>parseInt((r['날짜']||'').slice(8,10),10)).filter(Boolean))].sort((a,b)=>a-b);
  const subRow=startRow;
  // 터널명과 일자는 템플릿에서 서식이 다르다(터널명 16pt bold 좌측정렬 / 일자 13pt 일반 우측정렬) —
  // 하나의 병합 셀에 같은 서식으로 합쳐 넣지 않고 A:B(터널명) / C:E(일자)로 분리.
  ws.mergeCells(`A${subRow}:B${subRow}`);
  const nameCell=ws.getCell(`A${subRow}`);
  nameCell.value=`□ ${tunnel}`;
  nameCell.font={name:'맑은 고딕', size:16, bold:true};
  nameCell.alignment={vertical:'middle', horizontal:'left'};
  ws.mergeCells(`C${subRow}:E${subRow}`);
  const dateCell=ws.getCell(`C${subRow}`);
  dateCell.value = days.length ? `일자 : ${year}년 ${month}월 ${days.join(',')}일` : '';
  dateCell.font={name:'맑은 고딕', size:13, bold:false};
  dateCell.alignment={vertical:'middle', horizontal:'right'};
  ws.getRow(subRow).height=30;

  const headerRow=subRow+1;
  const headerLabels=['구분','점검내용','점검방법','점검결과','비  고'];
  const hRow=ws.getRow(headerRow);
  hRow.height=EXCEL_ROW_HEIGHTS.header;
  const dataCount=Math.max(rows.length,1);
  const noteRow=headerRow+1+dataCount;
  const noteEndRow=noteRow+ELECINSP_NOTE_ROWS-1;
  // 외곽 thin 박스가 헤더~데이터~특이사항 여백까지 하나로 이어진다(템플릿 실측) — 데이터 마지막 행의
  // 아래쪽은 hair(내부선)이고, 박스를 닫는 thin은 특이사항 박스의 마지막 행에서만 나온다.
  const REGION={r1:headerRow, r2:noteEndRow, c1:1, c2:5};
  function gb(r1,r2,c1,c2){
    return {
      top:{style: r1===REGION.r1?'thin':'hair'}, bottom:{style: r2===REGION.r2?'thin':'hair'},
      left:{style: c1===REGION.c1?'thin':'hair'}, right:{style: c2===REGION.c2?'thin':'hair'}
    };
  }
  headerLabels.forEach((h,i)=>{
    const cell=hRow.getCell(i+1);
    cell.value=h; cell.font=EXCEL_BODY_FONT;
    cell.alignment={vertical:'middle', horizontal:'center'};
    cell.border=gb(headerRow,headerRow,i+1,i+1); cell.fill=SECTION_FILL;
  });

  const gubunSpans=elecInspGubunSpans(rows);
  gubunSpans.forEach(span=>{
    const rn1=headerRow+1+span.start, rn2=headerRow+1+span.end;
    if(span.end>span.start) ws.mergeCells(`A${rn1}:A${rn2}`);
    ws.getCell(`A${rn1}`).border=gb(rn1,rn2,1,1);
  });
  // 템플릿은 모든 데이터 컬럼이 wrapText:true(구분·점검내용·비고처럼 길어질 수 있는 칸이 잘리지
  // 않도록) — 글자 수가 많아 줄바꿈되는 행은 excelWrapAwareRowHeight로 행높이를 자동 계산한다.
  const ELECINSP_COLS_META=[{key:'구분',wrap:true},{key:'점검내용',wrap:true},{key:'점검방법',wrap:true},{key:'점검결과',wrap:true},{key:'비고',wrap:true}];
  rows.forEach((r,i)=>{
    const rn=headerRow+1+i;
    const row=ws.getRow(rn);
    for(let ci=0; ci<5; ci++){
      const cell=row.getCell(ci+1);
      cell.font=EXCEL_BODY_FONT;
      if(ci>=1) cell.border=gb(rn,rn,ci+1,ci+1);
      cell.alignment = ci===1
        ? {vertical:'middle', horizontal:'left', wrapText:true, indent:1}
        : {vertical:'middle', horizontal:'center', wrapText:true};
    }
    row.getCell(1).value=r['구분'];
    row.getCell(2).value=r['점검내용'];
    row.getCell(3).value=r['점검방법'];
    row.getCell(4).value=r['점검결과'];
    row.getCell(5).value=r['비고'];
    row.height=excelWrapAwareRowHeight(r, ELECINSP_COLS_META, ELECINSP_COL_WIDTHS, EXCEL_BODY_FONT.size, EXCEL_ROW_HEIGHTS.data);
    row.commit();
  });
  if(!rows.length){ ws.getRow(headerRow+1).height=EXCEL_ROW_HEIGHTS.data; }

  // 특이사항: 템플릿은 라벨 1행 + 필기용 빈 여백 4행을 하나의 박스로 묶는다(좌우만 thin, 내부 구분선
  // 없음, 마지막 행에서만 bottom thin으로 박스를 닫음) — 이전 구현처럼 1행짜리 완결 박스가 아니다.
  // 노션 전기시설점검DB에는 레코드별 "특이사항" 텍스트 필드가 있다 — 그 달에 실제 입력된 값이
  // 있으면 라벨 다음 줄(2번째 행)에 실어서 보여준다(2026-07-24, 이전엔 항상 빈 필기박스였음).
  const noteText=[...new Set(recs.map(r=>(r['특이사항']||'').trim()).filter(Boolean))].join(' / ');
  // 주의: ExcelJS의 mergeCells()는 병합범위 안의 모든 셀 테두리를 마스터(맨 왼쪽) 셀의 테두리로
  // 덮어써버린다(실측 확인, 2026-07-24) — 그래서 좌우 테두리만 다르게 주는 이 특이사항 박스는
  // 병합으로는 만들 수 없다. 대신 5행을 병합하지 않고 A열에만 값을 넣어 텍스트가 옆 빈 셀(B~E)
  // 위로 자연스럽게 겹쳐 흐르게(overflow) 한다 — 화면/인쇄 모두 병합한 것과 동일하게 보인다.
  for(let i=0;i<ELECINSP_NOTE_ROWS;i++){
    const rn=noteRow+i;
    const isLast=i===ELECINSP_NOTE_ROWS-1;
    const row=ws.getRow(rn);
    row.height=EXCEL_ROW_HEIGHTS.data;
    for(let ci=0; ci<5; ci++){
      const cell=row.getCell(ci+1);
      cell.font=EXCEL_BODY_FONT;
      cell.border={
        left: ci===0?{style:'thin'}:undefined,
        right: ci===4?{style:'thin'}:undefined,
        bottom: isLast?{style:'thin'}:undefined
      };
    }
    if(i===0){
      const labelCell=row.getCell(1);
      labelCell.value='※ 특이사항';
      labelCell.alignment={vertical:'middle', horizontal:'left', indent:1};
    }
    if(i===1 && noteText){
      const noteValCell=row.getCell(1);
      noteValCell.value=noteText;
      noteValCell.alignment={vertical:'middle', horizontal:'left', indent:1};
    }
    row.commit();
  }

  return noteEndRow+2; // 특이사항 박스 뒤 빈 줄 1행 + 다음 블록 시작행
}
function buildElecInspReportSheet(wb, group, year, month, showTitle){
  const blocks=group.tunnels.map(t=>{
    const recs=elecInspTunnelRecs(t, year, month);
    return {tunnel:t, recs, rows:elecInspTunnelRows(recs)};
  }).filter(b=>b.rows.length);
  if(!blocks.length) return false;
  const ws=wb.addWorksheet(group.name,{
    views:[{showGridLines:false, zoomScale:90}],
    pageSetup:{paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, horizontalCentered:true, margins:EXCEL_PAGE_PRESETS.portrait},
    headerFooter:{oddHeader:'', oddFooter:'&R&"맑은 고딕,Regular"&11'+EXCEL_COMPANY_NAME+' '+group.name}
  });
  ws.columns=[12,42,10,10,14].map(w=>({width:w}));
  let row=1;
  if(showTitle){
    ws.mergeCells('A1:E1');
    const titleCell=ws.getCell('A1');
    titleCell.value='1. 터널전기시설 점검표'; titleCell.font={name:'HY헤드라인M', size:20};
    titleCell.alignment={vertical:'middle', horizontal:'left'};
    ws.getRow(1).height=50.05;
    row=2;
  }
  ws.getRow(row).height=10;
  row+=1;
  blocks.forEach(b=>{ row=drawElecInspTunnelBlock(ws, row, b.tunnel, b.rows, b.recs, year, month); });
  return true;
}
function exportElecInspReport(){
  const btn=document.getElementById('reportBtn_elecinsp');
  const lbl=document.getElementById('reportLbl_elecinsp');
  const ym=resolveTabYearMonth('elecinsp', '날짜');
  if(!ym){ alert('보고서를 생성할 데이터가 없습니다.'); return; }
  btn.disabled=true; lbl.textContent='생성 중...';
  loadExcelLib().then(()=>{
    const wb=new ExcelJS.Workbook();
    let titleShown=false, any=false;
    ELECINSP_SHEET_GROUPS.forEach(g=>{
      const ok=buildElecInspReportSheet(wb, g, ym.year, ym.month, !titleShown);
      if(ok){ titleShown=true; any=true; }
    });
    if(!any) throw new Error('해당 연월에 데이터가 없습니다.');
    return wb.xlsx.writeBuffer();
  }).then(buf=>{
    const blob=new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const fname=`${ym.year}년 ${ym.month}월 터널전기시설점검표_점검팀.xlsx`;
    const a=document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    lbl.textContent='완료!';
    setTimeout(()=>{ lbl.textContent='보고서 생성'; btn.disabled=false; }, 1500);
  }).catch(e=>{
    alert('보고서 생성 실패: '+e.message);
    console.error(e);
    lbl.textContent='보고서 생성'; btn.disabled=false;
  });
}

// 고장수리 — 원본 템플릿처럼 터널 구분 없이 한 표에 전체 터널을 담는다(시트 분리 없음).
function buildRepairReportRows(year, month){
  const ymStr=`${year}-${String(month).padStart(2,'0')}`;
  // 원본 템플릿 실측(2026-07-24) — 전월 발생·해당 월 조치완료 건도 포함된다(예: 5월 발생·6월
  // 조치 건이 6월 보고서에 실림). 발생일자 또는 조치일자 둘 중 하나라도 해당 월이면 포함.
  const recs=(TAB_STATE.repair.records||[])
    .filter(r=>(r['발생일자']||'').startsWith(ymStr) || (r['조치일자']||'').startsWith(ymStr));
  // 노션 원본에 "예정"→"완료"로 갱신하면서 새 레코드를 추가한(기존 레코드 수정이 아니라) 사례가
  // 있어(터널명+발생일자+이상발생내역이 같은 건), 보고서에는 더 진행된(조치내역이 채워진) 쪽만
  // 대표로 싣는다 — 원본 데이터 자체는 건드리지 않음, 화면용 대표 선정만.
  const byKey={};
  recs.forEach(r=>{
    const key=(r['터널명']||'')+'|'+(r['발생일자']||'')+'|'+(r['이상발생내역']||'');
    const prev=byKey[key];
    if(!prev || (!prev['조치내역'] && r['조치내역'])) byKey[key]=r;
  });
  return Object.values(byKey)
    .sort((a,b)=>(a['발생일자']||'').localeCompare(b['발생일자']||''))
    .map(r=>({터널명:r['터널명']||'', 발생일자:r['발생일자'], 이상발생내역:r['이상발생내역']||'', 조치일자:r['조치일자'], 조치내역:r['조치내역']||'', 작업자:r['작업자']||''}));
}
function buildRepairReportSheet(wb, rows){
  const ws=wb.addWorksheet('고장수리실적',{
    views:[{state:'frozen', ySplit:4, showGridLines:false, zoomScale:90}],
    pageSetup:{paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, horizontalCentered:true, margins:EXCEL_PAGE_PRESETS.portrait, printTitlesRow:'4:4'},
    headerFooter:{oddHeader:'', oddFooter:'&R&"맑은 고딕,Regular"&11'+EXCEL_COMPANY_NAME+' 점검팀'}
  });
  ws.columns=[14,13,42,13,32,16].map(w=>({width:w}));
  ws.mergeCells('A1:F1');
  const titleCell=ws.getCell('A1');
  titleCell.value='2. 고장수리실적'; titleCell.font={name:'HY헤드라인M', size:20};
  titleCell.alignment={vertical:'middle'};
  ws.getRow(1).height=50.05;
  ws.getRow(2).height=10; ws.getRow(3).height=10;

  const SECTION_FILL={type:'pattern', pattern:'solid', fgColor:{argb:'FFF2F2F2'}};
  // 템플릿 실측(2026-07-24, 고장수리실적 시트): 실제 데이터가 6건뿐이어도 표 테두리는 항상
  // 21행(5~25행)까지 그려진다 — 빈 줄도 나중에 손으로 채워 넣을 수 있게 테두리를 미리 그어둔
  // 고정 서식지 방식. 데이터가 21건을 넘으면 그 이상은 자연히 늘어난다(Math.max이므로 하한선만 고정).
  const REPAIR_TABLE_MIN_ROWS=21;
  const totalRows=Math.max(rows.length, REPAIR_TABLE_MIN_ROWS);
  const REGION={r1:4, r2:4+totalRows, c1:1, c2:6};
  function gb(r1,r2,c1,c2){
    return {
      top:{style: r1===REGION.r1?'thin':'hair'}, bottom:{style: r2===REGION.r2?'thin':'hair'},
      left:{style: c1===REGION.c1?'thin':'hair'}, right:{style: c2===REGION.c2?'thin':'hair'}
    };
  }
  const headerLabels=['터널명','발생일자','이상발생내역','조치일자','조치내역','작업자'];
  const headerRow=ws.getRow(4);
  headerRow.height=40; // 템플릿 실측 — 헤더·데이터·빈 행 전부 40 균일(EXCEL_ROW_HEIGHTS.header=30과 다름)
  headerLabels.forEach((h,i)=>{
    const cell=headerRow.getCell(i+1);
    cell.value=h; cell.font=EXCEL_BODY_FONT;
    cell.alignment={vertical:'middle', horizontal:'center'};
    cell.border=gb(4,4,i+1,i+1); cell.fill=SECTION_FILL;
  });
  const COL_ALIGN=[
    {vertical:'middle', horizontal:'center', shrinkToFit:true},
    {vertical:'middle', horizontal:'center', shrinkToFit:true},
    {vertical:'middle', horizontal:'left', wrapText:true, indent:1},
    {vertical:'middle', horizontal:'center', shrinkToFit:true},
    {vertical:'middle', horizontal:'left', wrapText:true, indent:1},
    {vertical:'middle', horizontal:'center', shrinkToFit:true}
  ];
  const REPAIR_COL_WIDTHS=[14,13,42,13,32,16];
  const REPAIR_COLS_META=[{key:'터널명'},{key:'발생일자'},{key:'이상발생내역',wrap:true},{key:'조치일자'},{key:'조치내역',wrap:true},{key:'작업자'}];
  for(let i=0;i<totalRows;i++){
    const r=rows[i]||null;
    const rn=5+i;
    const row=ws.getRow(rn);
    row.height = r ? excelWrapAwareRowHeight(r, REPAIR_COLS_META, REPAIR_COL_WIDTHS, EXCEL_BODY_FONT.size, 40) : 40; // 템플릿 기본행높이 40(위 headerRow와 동일 근거)
    for(let ci=0; ci<6; ci++){
      const cell=row.getCell(ci+1);
      cell.font=EXCEL_BODY_FONT;
      cell.border=gb(rn,rn,ci+1,ci+1);
      cell.alignment=COL_ALIGN[ci];
    }
    if(r){
      row.getCell(1).value=r.터널명;
      const d1=excelParseDate(r.발생일자);
      if(d1){ row.getCell(2).value=d1; row.getCell(2).numFmt='yyyy-mm-dd'; } else row.getCell(2).value=r.발생일자;
      row.getCell(3).value=r.이상발생내역;
      const d2=excelParseDate(r.조치일자);
      if(d2){ row.getCell(4).value=d2; row.getCell(4).numFmt='yyyy-mm-dd'; } else row.getCell(4).value=r.조치일자;
      row.getCell(5).value=r.조치내역;
      row.getCell(6).value=r.작업자;
    }
    row.commit();
  }
}

// 점검사진 — 원본 템플릿처럼 터널 구분 없이 번호(해당 월 전체 일련번호) 순서로 6장씩 사진1~N 시트에 배치.
function buildPhotoTeamReportRows(year, month){
  const ymStr=`${year}-${String(month).padStart(2,'0')}`;
  return (TAB_STATE.photo.records||[])
    .filter(r=>(r['일자']||'').startsWith(ymStr) && r['번호'])
    .slice()
    .sort((a,b)=>(parseInt(a['번호'],10)||0)-(parseInt(b['번호'],10)||0));
}
function buildPhotoTeamReportSheet(wb, sheetRows, sheetIdx, showTitle){
  const ws=wb.addWorksheet('사진'+sheetIdx,{
    views:[{showGridLines:false, zoomScale:90}],
    pageSetup:{paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, horizontalCentered:true, margins:EXCEL_PAGE_PRESETS.portrait},
    headerFooter:{oddHeader:'', oddFooter:'&R&"맑은 고딕,Regular"&11'+EXCEL_COMPANY_NAME+' 점검팀'}
  });
  // 열 너비는 균등폭이 아니라 템플릿 실측값(2026-07-24, 사진1 시트 A~J 컬럼폭) 그대로 —
  // 번호(A/F)는 좁게, 라벨(B/G)은 중간, 값(C~E/H~J, 3칸 병합)은 넓게.
  ws.columns=TEAM_PHOTO_COL_WIDTHS.map(w=>({width:w}));
  const F=(size,bold)=>({name:'맑은 고딕', size:size, bold:!!bold});
  const CENTER={vertical:'middle', horizontal:'center'};
  const LEFT={vertical:'middle', horizontal:'left'};
  const LEFT_INDENT={vertical:'middle', horizontal:'left', indent:1};
  const LEFT_SHRINK={vertical:'middle', horizontal:'left', shrinkToFit:true, indent:1};
  const IMG_BORDER={top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'}};
  function rangeBounds(range){
    const parts=range.split(':');
    const m1=/^([A-Z]+)(\d+)$/.exec(parts[0]);
    const m2=/^([A-Z]+)(\d+)$/.exec(parts[1]||parts[0]);
    function colNum(letters){ let n=0; for(let i=0;i<letters.length;i++) n=n*26+(letters.charCodeAt(i)-64); return n; }
    return {c1:colNum(m1[1]), r1:+m1[2], c2:colNum(m2[1]), r2:+m2[2]};
  }
  function gridBorder(range, region){
    const b=rangeBounds(range);
    return {
      top:{style: b.r1===region.r1?'thin':'hair'}, bottom:{style: b.r2===region.r2?'thin':'hair'},
      left:{style: b.c1===region.c1?'thin':'hair'}, right:{style: b.c2===region.c2?'thin':'hair'}
    };
  }
  function mc(range, value, font, alignment, numFmt, border){
    const addr=range.split(':')[0];
    const cell=ws.getCell(addr);
    if(value!==undefined && value!==null && value!=='') cell.value=value;
    cell.font=font||F(10);
    cell.alignment=alignment||CENTER;
    if(numFmt) cell.numFmt=numFmt;
    cell.border = border===false ? undefined : border;
    if(range.indexOf(':')>=0) ws.mergeCells(range);
    return cell;
  }
  // 템플릿 실측(2026-07-24, 사진1·사진2 시트 대조): 제목 유무와 무관하게 1~3행은 항상
  // 같은 높이로 예약돼 있다(1행=50.05 제목행 자리, 2행=10 여백, 3행=30 여백) — 이전 구현은
  // 제목이 없는 시트(사진2 이후)에서 이 3행 구조를 만들지 않고 바로 1행짜리 여백만 두는 바람에
  // 그리드 시작행이 템플릿보다 위로 당겨져 있었다(제목 없는 시트에서 1~2행 누락).
  mc('A1:J1', showTitle?'3. 운영관리 사진대지':null, {name:'HY헤드라인M', size:20}, LEFT, undefined, false);
  ws.getRow(1).height=50.05;
  ws.getRow(2).height=10;
  ws.getRow(3).height=30;
  const gridStart=4;

  const photoTasks=[];
  for(let band=0; band<3; band++){
    const imgStart=gridStart+band*15, imgEnd=imgStart+12;
    const lbl1=imgEnd+1, lbl2=imgEnd+2;
    for(let rn=imgStart; rn<=imgEnd; rn++) ws.getRow(rn).height=13.1;
    ws.getRow(lbl1).height=25.1; ws.getRow(lbl2).height=25.1;
    for(let side=0; side<2; side++){
      const idx=band*2+side;
      const r=sheetRows[idx];
      const c1=side===0?1:6, c2=side===0?5:10;
      const cL=colLetter(c1), cR=colLetter(c2), cNo=cL, cLbl=colLetter(c1+1), cVal1=colLetter(c1+2), cVal2=cR;
      mc(`${cL}${imgStart}:${cR}${imgEnd}`, null, F(11), CENTER, undefined, IMG_BORDER);
      const url=r ? (r['점검사진']||[])[0]?.url : '';
      if(url) photoTasks.push({url, c1:c1-1, r1:imgStart-1, c2:c2-1, r2:imgEnd-1});
      const region={r1:lbl1, r2:lbl2, c1, c2};
      mc(`${cNo}${lbl1}:${cNo}${lbl2}`, r?('#'+r['번호']):null, F(10), CENTER, undefined, gridBorder(`${cNo}${lbl1}:${cNo}${lbl2}`, region));
      mc(`${cLbl}${lbl1}`, '일      자', F(10), CENTER, undefined, gridBorder(`${cLbl}${lbl1}`, region));
      mc(`${cVal1}${lbl1}:${cVal2}${lbl1}`, r?excelParseDate(r['일자']):null, F(10), LEFT_INDENT, 'yyyy"년" m"월" d"일";@', gridBorder(`${cVal1}${lbl1}:${cVal2}${lbl1}`, region));
      mc(`${cLbl}${lbl2}`, '사진설명', F(10), CENTER, undefined, gridBorder(`${cLbl}${lbl2}`, region));
      mc(`${cVal1}${lbl2}:${cVal2}${lbl2}`, r?r['사진설명']:null, F(10), LEFT_SHRINK, undefined, gridBorder(`${cVal1}${lbl2}:${cVal2}${lbl2}`, region));
    }
  }
  return Promise.all(photoTasks.map(t=>
    excelFetchImage(t.url).then(img=>{
      if(!img) return;
      const imgId=wb.addImage(img);
      ws.addImage(imgId, excelPhotoAnchorBlock(t.c1, t.r1, t.c2, t.r2));
    })
  ));
}
async function exportPhotoTeamReport(){
  const btn=document.getElementById('reportBtn_photo');
  const lbl=document.getElementById('reportLbl_photo');

  }catch(e){
    alert('보고서 생성 실패: '+e.message);

// ── 표지·일지간지 + "통합 보고서 생성" (원본 엑셀 템플릿 전체를 한 파일로 재현) ──
// 안전관리 앱과 달리 점검팀은 터널별로 나누지 않고 이미 한 번의 보고서 생성이 전체 터널을
// 다 훑는 구조라(전기시설점검=8개 그룹시트, 고장수리=단일표, 점검사진=번호 순 전체) 안전관리처럼
// 터널마다 반복 호출할 필요가 없다 — 연/월 하나만 정하면 통합 보고서 1개가 바로 완성된다.
// 표지·일지간지 2개 시트는 노션 DB가 없다(템플릿 실측 — 연월만으로 완성되는 고정 서식).
const TEAM_TOC_ITEMS=['1. 터널전기시설 점검표', '2. 고장수리실적', '3. 운영관리 사진대지', '4. 터널시설점검일지'];
function buildTeamCoverReportSheet(wb, year, month){
  const ws=wb.addWorksheet('표지',{
    views:[{showGridLines:false, zoomScale:90}],
    pageSetup:{paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, margins:EXCEL_PAGE_PRESETS.portrait}
  });
  ws.columns=Array(13).fill(0).map(()=>({width:8.86}));
  const TITLE={vertical:'middle', horizontal:'left'};
  const CENTER={vertical:'middle', horizontal:'center'};

  for(let r=1; r<=27; r++) ws.getRow(r).height=34.1;

  ws.mergeCells('A1:M1');
  const titleCell=ws.getCell('A1');
  titleCell.value='라. 점검팀'; titleCell.font={name:'HY헤드라인M', size:26}; titleCell.alignment=TITLE;

  ws.mergeCells('A9:M9');
  const dateCell=ws.getCell('A9');
  dateCell.value=`${year}년 ${month}월`; dateCell.font={name:'HY헤드라인M', size:24}; dateCell.alignment=CENTER;

  ws.mergeCells('G16:H16');
  const tocTitle=ws.getCell('G16');
  tocTitle.value='목    차'; tocTitle.font={name:'HY헤드라인M', size:20}; tocTitle.alignment=CENTER;

  TEAM_TOC_ITEMS.forEach((item, i)=>{
    const cell=ws.getCell(`G${17+i}`);
    cell.value=item; cell.font={name:'HY헤드라인M', size:20}; cell.alignment=TITLE;
  });
}
function buildTeamDailyLogDividerSheet(wb, year, month){
  const ws=wb.addWorksheet('일지간지',{
    views:[{showGridLines:false, zoomScale:90}],
    pageSetup:{paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, margins:EXCEL_PAGE_PRESETS.portrait, printArea:'A1:E25'}
  });
  ws.columns=[17.57,19.79,32.07,16,14].map(w=>({width:w}));
  const TITLE={vertical:'middle', horizontal:'left'};
  const CENTER={vertical:'middle', horizontal:'center'};

  ws.getRow(1).height=50.15;
  const titleCell=ws.getCell('A1');
  titleCell.value='4. 터널시설점검일지'; titleCell.font={name:'HY헤드라인M', size:26}; titleCell.alignment=TITLE;

  ws.getRow(2).height=20.15;
  for(let r=3; r<=13; r++) ws.getRow(r).height=30;

  ws.mergeCells('A14:E14');
  const lastDay=new Date(year, month, 0).getDate();
  const periodCell=ws.getCell('A14');
  periodCell.value=`기간 : ${year}년 ${month}월 1일 ~ ${year}년 ${month}월 ${lastDay}일`;
  periodCell.font={name:'맑은 고딕', size:20}; periodCell.alignment=CENTER;
  ws.getRow(14).height=30;

  for(let r=15; r<=25; r++) ws.getRow(r).height=30;
}
// 통합 보고서는 전기시설점검 탭에서 트리거되므로, 아직 방문 안 해서 TAB_STATE가 비어있는
// 탭(고장수리/점검사진)은 먼저 로드해줘야 한다 — 안 그러면 "해당 월에 데이터가 없어서"가
// 아니라 "탭을 안 열어봐서" 빠지는 조용한 누락이 생긴다.
async function ensureTabLoaded(id){
  if(TAB_STATE[id].loaded) return;
  await loadTabData(id);
}
async function buildOneTeamUnifiedReport(year, month){
  await loadExcelLib(true);
  await Promise.all(['elecinsp','repair','photo'].map(ensureTabLoaded));

  const wb=new ExcelJS.Workbook();
  let hasData=false;
  buildTeamCoverReportSheet(wb, year, month);

  // 1. 터널전기시설 점검표 — 그룹(시트)당 데이터 있는 터널만 그려진다(buildElecInspReportSheet 내부 처리)
  let titleShown=false;
  ELECINSP_SHEET_GROUPS.forEach(g=>{
    const ok=buildElecInspReportSheet(wb, g, year, month, !titleShown);
    if(ok){ titleShown=true; hasData=true; }
  });

  // 2. 고장수리실적
  const repairRows=buildRepairReportRows(year, month);
  if(repairRows.length){ buildRepairReportSheet(wb, repairRows); hasData=true; }

  // 3. 운영관리 사진대지 — 6장씩 사진1~N 시트
  const photoRows=buildPhotoTeamReportRows(year, month);
  if(photoRows.length){
    const sheetCount=Math.ceil(photoRows.length/6);
    for(let s=0; s<sheetCount; s++){
      const sheetRows=photoRows.slice(s*6, s*6+6);
      await buildPhotoTeamReportSheet(wb, sheetRows, s+1, s===0);
    }
    hasData=true;
  }

  // 4. 터널시설점검일지(간지) — 원본처럼 데이터 없이도 항상 포함
  buildTeamDailyLogDividerSheet(wb, year, month);

  if(!hasData) throw new Error('해당 연월에 생성할 데이터가 없습니다.');

  const buf=await wb.xlsx.writeBuffer();
  const blob=await excelUnlockAspectRatio(buf);
  return {blob, year, month};
}
function exportTeamUnifiedReport(){
  const btn=document.getElementById('unifiedReportBtn');
  const lbl=document.getElementById('unifiedReportLbl');
  const ym=resolveTabYearMonth('elecinsp', '날짜');
  if(!ym){ alert('보고서를 생성할 데이터가 없습니다.'); return; }

    const fname=`${year}년 ${month}월 점검결과보고서_점검팀.xlsx`;
    const a=document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    lbl.textContent='완료!';
    setTimeout(()=>{ lbl.textContent='통합 보고서 생성'; btn.disabled=false; }, 1500);
  }).catch(e=>{
    alert('통합 보고서 생성 실패: '+e.message);
    console.error(e);
    lbl.textContent='통합 보고서 생성'; btn.disabled=false;
  });
}

// ── 하단 탭 전환 ──
const PANEL_IDS=TAB_DEFS.map(t=>t.id);
let _activePanel=PANEL_IDS[0];
function switchPanel(id){
  if(id===_activePanel) return;
  _activePanel=id;
  PANEL_IDS.forEach(p=>{
    document.getElementById('panel-'+p)?.classList.toggle('active', p===id);
    const btn=document.getElementById('nav-'+p);
    if(btn){ btn.classList.toggle('active', p===id); btn.setAttribute('aria-selected', p===id?'true':'false'); }
  });
  requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'smooth'}));
  const tabDef=getTabDef(id);
  if(tabDef && tabDef.fields && !TAB_STATE[id].loaded && isAuthed()) loadTabData(id);
}

// ── 초기화 ──
if(isAuthed()){ loadTabData('elecinsp'); }
else { openLoginModal(); }
